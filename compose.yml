services:
  db:
    image: postgres:16-alpine
    container_name: vineo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vineo
    ports:
      - "5432:5432"
    volumes:
      - vineo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vineo"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  vineo-db-data:
